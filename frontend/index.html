
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="https://res.cloudinary.com/dhiczfj7e/image/upload/v1774328232/LOGO-QHN_h3xglw.png" />
      <title>Phụ kiện quạt hơi nước</title>
    <!-- GA4 Analytics: Vite replaces %VITE_GA4_MEASUREMENT_ID% at build time -->
    <!-- In dev or when unset, the string stays literal and the guard exits early -->
    <script>
      (function() {
        var id = '%VITE_GA4_MEASUREMENT_ID%';
        if (!id || id.indexOf('VITE_GA4') !== -1) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ window.dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', id);
      })();
    </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
