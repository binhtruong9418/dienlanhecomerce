# HTTP: redirect to HTTPS + phục vụ certbot challenge
server {
    listen 80 default_server;
    server_name phukienquathoinuoc.com www.phukienquathoinuoc.com _;

    # Certbot challenge (PHẢI có trước redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name phukienquathoinuoc.com www.phukienquathoinuoc.com;

    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/phukienquathoinuoc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phukienquathoinuoc.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
