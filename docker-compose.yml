version: "3"

services:
  mongodb:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/mydb
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: dienlanhe_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  mongo-data: