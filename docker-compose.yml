version: "3"

services:
  mongodb:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/mydb
      - PORT=5000
    depends_on:
      - mongodb

  nginx:
    image: nginx:alpine
    container_name: dienlanhe_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - backend
volumes:
  mongo-data: