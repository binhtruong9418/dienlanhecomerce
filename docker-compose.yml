version: "3"

services:
  mongodb:
    image: mongo:latest
    container_name: dienlanhe_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env.production
    environment:
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: dienlanhe_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data: