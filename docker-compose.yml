version: "3.8"

services:
  backend:
    build: ./backend
    container_name: phukien_backend
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      - PORT=5000
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: phukien_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - web
      - internal

networks:
  web:
    external: true
  internal:
    name: phukien_internal