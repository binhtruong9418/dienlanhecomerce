version: "3.8"

services:
  backend:
    build: ./backend
    container_name: phukien_backend
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      - PORT=5000

  frontend:
    build: ./frontend
    container_name: phukien_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

networks:
  default:
    name: phukien_network