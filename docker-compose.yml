version: "3"

services:
  mongodb:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/mydb
    depends_on:
      - mongodb

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # nginx config
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

      # React build output
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  mongo-data: